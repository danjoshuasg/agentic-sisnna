# =============================================================================

version: "1.0"
source_default: CONTEXT/rdf-docs/flujo.md

nodos:

  # --- Flujo + Actores ------------------------------------------------------
  - {id: "Flujo:rdf", tipo: Flujo, datos: {nombre: "Riesgo de desprotección familiar", ejecutor: "DEMUNA acreditada"},
     descripcion: "Procedimiento administrativo por riesgo de desprotección familiar que ejecuta la DEMUNA acreditada cuando un NNA convive con su familia pero hay factores de riesgo."}
  - {id: "Actor:demuna", tipo: Actor, datos: {nombre: "DEMUNA acreditada", nivel: local},
     descripcion: "Defensoría Municipal del Niño y Adolescente acreditada. Ejecuta el procedimiento por riesgo con equipo interdisciplinario (abogado, psicólogo, trabajador social)."}
  - {id: "Actor:dsld", tipo: Actor, datos: {nombre: "DSLD-DGNNA-MIMP", nivel: nacional},
     descripcion: "Dirección de Sistemas Locales y Defensorías. Acredita, registra, supervisa y sanciona a las DEMUNA. Dueña funcional del SisDNA."}
  - {id: "Actor:upe", tipo: Actor, datos: {nombre: "Unidad de Protección Especial", nivel: nacional},
     descripcion: "UPE del MIMP. Atiende la desprotección familiar (caso grave, NNA sin cuidados parentales). La DEMUNA le deriva cuando detecta desprotección."}
  - {id: "Actor:juzgado_familia", tipo: Actor, datos: {nombre: "Juzgado de familia o mixto", nivel: judicial},
     descripcion: "Vía judicial. Puede declinar competencia a la DEMUNA."}

  # --- Etapas ---------------------------------------------------------------
  - {id: "Etapa:rdf_recepcion", tipo: Etapa, datos: {nombre: "Recepción", orden: 1, flujo: rdf},
     descripcion: "Etapa 1. Registra el caso en Formato N°01 y genera la codificación del expediente. Decide si el caso entró por declinación de UPE/juzgado."}
  - {id: "Etapa:rdf_valoracion", tipo: Etapa, datos: {nombre: "Valoración", orden: 2, flujo: rdf},
     descripcion: "Etapa 2. Identifica signos de alerta (Anexo N°01) y elabora el informe de valoración de riesgo (Anexo N°02). Decide presunción de riesgo o de desprotección familiar."}
  - {id: "Etapa:rdf_evaluacion", tipo: Etapa, datos: {nombre: "Evaluación", orden: 3, flujo: rdf},
     descripcion: "Etapa 3. Visita domiciliaria, entrevistas a NNA y familia, informe de evaluación interdisciplinario (Informe N°03). Declara o no el riesgo."}
  - {id: "Etapa:rdf_pti", tipo: Etapa, datos: {nombre: "PTI, implementación y seguimiento", orden: 4, flujo: rdf},
     descripcion: "Etapa 4. Elabora el Plan de Trabajo Individual (PTI) para neutralizar el riesgo, aprueba medidas de protección (Resolución N°06) y da seguimiento."}
  - {id: "Etapa:rdf_conclusion", tipo: Etapa, datos: {nombre: "Conclusión", orden: 5, flujo: rdf},
     descripcion: "Etapa 5. Concluye el procedimiento por riesgo con Resolución N°07 y notifica a las partes."}
  - {id: "Etapa:rdf_recurrente", tipo: Etapa, datos: {nombre: "Rectificación / variación / reconsideración", orden: 99, flujo: rdf},
     descripcion: "Subproceso recurrente disponible desde varias etapas: rectificar resoluciones, variar medidas, resolver recursos de reconsideración."}

  # --- Plazos (Ley 32017 para riesgo) --------------------------------------
  - {id: "Plazo:rdf_recepcion_1dh", tipo: Plazo, datos: {valor: 1, unidad: dia_habil, descripcion: "Recepción: 1 día hábil"},
     descripcion: "Plazo de la etapa de recepción: un día hábil."}
  - {id: "Plazo:rdf_valoracion_1dh", tipo: Plazo, datos: {valor: 1, unidad: dia_habil, descripcion: "Valoración: 1 día hábil, ampliable +1"},
     descripcion: "Plazo de la etapa de valoración: un día hábil, ampliable un día hábil adicional por resolución."}
  - {id: "Plazo:rdf_evaluacion_5dh", tipo: Plazo, datos: {valor: 5, unidad: dia_habil, descripcion: "Evaluación: 5 días hábiles"},
     descripcion: "Plazo de la etapa de evaluación del riesgo: cinco días hábiles."}
  - {id: "Plazo:rdf_pti_10dh", tipo: Plazo, datos: {valor: 10, unidad: dia_habil, descripcion: "Elaboración del PTI: 10 días hábiles"},
     descripcion: "Plazo para elaborar el Plan de Trabajo Individual: diez días hábiles."}
  - {id: "Plazo:rdf_medida_9m", tipo: Plazo, datos: {valor: 9, unidad: mes, descripcion: "Medida de protección por riesgo: máx 9 meses (Ley 32017)"},
     descripcion: "Duración máxima de la medida de protección en riesgo: nueve meses, según la Ley 32017."}
  - {id: "Plazo:rdf_pti_12m", tipo: Plazo, datos: {valor: 12, unidad: mes, descripcion: "PTI por riesgo: máx 12 meses (Ley 32017)"},
     descripcion: "Duración máxima del PTI en riesgo: doce meses, según la Ley 32017. (El 18 meses del diagrama TDR es de desprotección, no de riesgo.)"}
  - {id: "Plazo:rdf_recurrente_5dh", tipo: Plazo, datos: {valor: 5, unidad: dia_habil, descripcion: "Subproceso recurrente: 5 días hábiles"},
     descripcion: "Plazo del subproceso de rectificación/variación/reconsideración: cinco días hábiles."}

  # --- Compuertas (decisiones) ---------------------------------------------
  - {id: "Compuerta:rdf_recepcion_declinacion", tipo: Compuerta, datos: {pregunta: "¿El caso fue declinado por UPE o juzgado?"},
     descripcion: "Decisión en recepción: si el caso entra por declinación de competencia de UPE/juzgado, se adjunta Resolución N°01 y se decide a qué etapa entra."}
  - {id: "Compuerta:rdf_valoracion_df", tipo: Compuerta, datos: {pregunta: "¿Hay presunción de desprotección familiar?"},
     descripcion: "Decisión en valoración: si hay presunción de desprotección familiar, no se inicia riesgo (Resolución N°02) y se deriva a la UPE."}
  - {id: "Compuerta:rdf_valoracion_riesgo", tipo: Compuerta, datos: {pregunta: "¿Hay presunción de riesgo?"},
     descripcion: "Decisión en valoración: si hay presunción de riesgo, se inicia el procedimiento (Resolución N°04); si no, Resolución N°03 (no inicia)."}
  - {id: "Compuerta:rdf_evaluacion_df", tipo: Compuerta, datos: {pregunta: "¿Hay desprotección familiar?"},
     descripcion: "Decisión en evaluación: si hay desprotección familiar se deriva a UPE (Resolución N°02)."}
  - {id: "Compuerta:rdf_evaluacion_riesgo", tipo: Compuerta, datos: {pregunta: "¿Se confirma el riesgo?"},
     descripcion: "Decisión en evaluación: si se confirma el riesgo se declara (Resolución N°05) y pasa a PTI; si no, Resolución N°03."}
  - {id: "Compuerta:rdf_evaluacion_declinacion", tipo: Compuerta, datos: {pregunta: "¿Declinación de competencia a otra DNA?"},
     descripcion: "Decisión en evaluación: si procede declinar competencia a otra DNA, Resolución N°11 y conclusión."}
  - {id: "Compuerta:rdf_pti_cierre", tipo: Compuerta, datos: {pregunta: "¿Se cumplieron los objetivos del PTI o hay desprotección?"},
     descripcion: "Decisión al cierre del PTI: si se cumplieron objetivos pasa a conclusión; si aparece desprotección, deriva a UPE."}

  # --- Medida ---------------------------------------------------------------
  - {id: "Medida:rdf_proteccion", tipo: Medida, datos: {nombre: "Medidas de protección por riesgo", tipo: proteccion},
     descripcion: "Medidas de protección dispuestas en el PTI para neutralizar el riesgo (aprobadas por Resolución N°06). Máx 9 meses (Ley 32017)."}

