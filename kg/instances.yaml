# =============================================================================
# INSTANCIAS del Knowledge Graph — Flujo RDF (riesgo de desprotección familiar)
# Autoría declarativa (NO extracción NLP). Tipos en kg/ontology.yaml.
# Fuente: CONTEXT/rdf-docs/flujo.md (+ flujo-web-validacion, leyes). Trazable por source_path.
