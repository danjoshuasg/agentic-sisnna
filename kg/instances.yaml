  # ===========================================================================
  # FLUJO DF (desprotección familiar, UPE). Fuente: CONTEXT/desproteccion-docs/flujo.md
  # Reglamento DS 001-2018 Arts 11-102 + DL 1297 Art 52. Slice A3.
  # ===========================================================================
  - {id: "Flujo:df", tipo: Flujo, datos: {nombre: "Desprotección familiar", ejecutor: "UPE"}, descripcion: "Procedimiento por desprotección familiar que ejecuta la UPE cuando el NNA ya perdió los cuidados parentales: tutela estatal, acogimiento, vía judicial y adoptabilidad.", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Actor:dpe", tipo: Actor, datos: {nombre: "Dirección de Protección Especial (DGNNA-MIMP)", nivel: nacional}, descripcion: "DPE: rectora de las UPE (normas, lineamientos, supervisión).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Actor:ministerio_publico", tipo: Actor, datos: {nombre: "Ministerio Público (Fiscalía de Familia)", nivel: nacional}, descripcion: "Parte en la vista de causa judicial de desprotección familiar.", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Actor:car", tipo: Actor, datos: {nombre: "Centro de Acogida Residencial (CAR)", nivel: local}, descripcion: "Acoge al NNA sin familia: centros de urgencia, básico y especializado.", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Actor:banco_familias", tipo: Actor, datos: {nombre: "Banco de Familias Acogedoras", nivel: nacional}, descripcion: "Familias que acogen temporalmente al NNA (acogimiento con tercero/profesionalizado).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Actor:unidad_adopcion", tipo: Actor, datos: {nombre: "Unidad de Adopción", nivel: nacional}, descripcion: "Conduce el proceso de adopción tras la declaración judicial de desprotección.", source_path: CONTEXT/desproteccion-docs/flujo.md}

  - {id: "Etapa:df_inicio", tipo: Etapa, datos: {nombre: "Inicio y comunicación", orden: 1, flujo: df}, descripcion: "Etapa 1 DF. La UPE actúa de oficio o por comunicación (PNP, Fiscalía, IE/salud, DEMUNA que deriva). Atención inmediata 24/7 (Arts 11.a, 22).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_valoracion", tipo: Etapa, datos: {nombre: "Valoración preliminar", orden: 2, flujo: df}, descripcion: "Etapa 2 DF. Valora amenaza/afectación con la Tabla de Valoración de Riesgo (RM 189-2021) y decide por resolución iniciar el procedimiento por DF (Art 26).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_evaluacion", tipo: Etapa, datos: {nombre: "Evaluación interdisciplinaria", orden: 3, flujo: df}, descripcion: "Etapa 3 DF. Entrevistas, evaluaciones psicológicas/sociales, visitas, exámenes médico-legales, RENIEC. Diligencias exclusivas 5 días hábiles (Arts 32-41).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_declaracion_provisional", tipo: Etapa, datos: {nombre: "Declaración de DF provisional", orden: 4, flujo: df}, descripcion: "Etapa 4 DF. Tras escuchar al NNA, la UPE declara la desprotección familiar provisional y asume la tutela estatal (Art 67, Art 11.f), disparando las medidas de protección.", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_medidas", tipo: Etapa, datos: {nombre: "Medidas de protección provisionales", orden: 5, flujo: df}, descripcion: "Etapa 5 DF. La UPE dispone una medida: acogimiento familiar (extensa/tercero/profesionalizado/permanente) o acogimiento residencial en CAR (Arts 70-102).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_pti", tipo: Etapa, datos: {nombre: "Plan de Trabajo Individual (DF)", orden: 6, flujo: df}, descripcion: "Etapa 6 DF. PTI en máx 20 días hábiles desde la resolución de DF provisional; aprobación 1 día hábil después. Medida hasta 18 meses (Ley 32017) (Arts 42-47).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_acceso_expediente", tipo: Etapa, datos: {nombre: "Acceso al expediente y alegatos", orden: 7, flujo: df}, descripcion: "Etapa 7 DF. La UPE pone el expediente a disposición 5 días hábiles; las partes presentan alegatos en 3 días hábiles (Art 66).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_transito_judicial", tipo: Etapa, datos: {nombre: "Tránsito a vía judicial", orden: 8, flujo: df}, descripcion: "Etapa 8 DF. La UPE solicita pronunciamiento judicial; vista de causa con 3 días hábiles de anticipación; audiencia especial al NNA; si no asisten, el juez resuelve en 5 días hábiles (Arts 11.j, 68).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_declaracion_judicial", tipo: Etapa, datos: {nombre: "Declaración judicial de DF", orden: 9, flujo: df}, descripcion: "Etapa 9 DF. El Juzgado de Familia o Mixto declara judicialmente la desprotección familiar y habilita la medida permanente (Art 52 DL 1297).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Etapa:df_adoptabilidad", tipo: Etapa, datos: {nombre: "Adoptabilidad", orden: 10, flujo: df}, descripcion: "Etapa 10 DF. Declarada la DF judicial, el caso pasa a adopción vía Unidad de Adopción; atención especial a NNA mayores de 6 años (Arts 14-16).", source_path: CONTEXT/desproteccion-docs/flujo.md}

  - {id: "Plazo:df_evaluacion_5dh", tipo: Plazo, datos: {valor: 5, unidad: dia_habil, descripcion: "Diligencias exclusivas de evaluación: 5 días hábiles (Art 41)"}, descripcion: "Plazo de diligencias exclusivas en la evaluación DF: cinco días hábiles (Art 41).", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Plazo:df_pti_20dh", tipo: Plazo, datos: {valor: 20, unidad: dia_habil, descripcion: "Elaboración del PTI en DF: máx 20 días hábiles (Arts 42-47)"}, descripcion: "Plazo para elaborar el PTI en desprotección: máximo veinte días hábiles desde la resolución de DF provisional; aprobación 1 día hábil después.", source_path: CONTEXT/desproteccion-docs/flujo.md}
  - {id: "Plazo:df_medida_18m", tipo: Plazo, datos: {valor: 18, unidad: mes, descripcion: "Medida/PTI en DF: hasta 18 meses (Ley 32017)"}, descripcion: "Duración máxima de la medida y del PTI en desprotección: hasta dieciocho meses, según la Ley 32017.", source_path: CONTEXT/desproteccion-docs/flujo.md}
